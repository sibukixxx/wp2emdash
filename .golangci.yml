version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - staticcheck
    - thelper
    - tparallel
    - unused
formatters:
  enable:
    - gofmt
issues:
  exclusions:
    rules:
      - path: '(.+)_test\.go'
        linters:
          - errcheck
